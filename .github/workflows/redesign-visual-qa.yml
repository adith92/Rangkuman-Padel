name: Redesign Visual QA

on:
  push:
    branches:
      - redesign/executive-command-center-v15
  workflow_dispatch:

jobs:
  visual-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright
        run: |
          npm init -y
          npm install --no-save playwright@1.54.2
          npx playwright install --with-deps chromium

      - name: Start static server
        run: |
          python3 -m http.server 4173 > /tmp/padel-server.log 2>&1 &
          echo $! > /tmp/padel-server.pid
          for i in {1..20}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/padel-server.log
          exit 1

      - name: Capture and test
        run: node qa/redesign-visual-qa.mjs

      - name: Upload QA artifact
        uses: actions/upload-artifact@v4
        with:
          name: redesign-v15-visual-qa
          path: qa-output/
          if-no-files-found: error
          retention-days: 7
