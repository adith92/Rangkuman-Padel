<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0f4c81">
<title>Padel Sport Indonesia</title>
<style>
  *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0f4c81,#1e40af,#0d9488);color:white;padding:24px}.loader{width:min(460px,100%);text-align:center;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:24px;padding:30px;backdrop-filter:blur(12px);box-shadow:0 24px 70px rgba(0,0,0,.22)}.ball{font-size:48px;animation:b 1s ease-in-out infinite alternate}@keyframes b{to{transform:translateY(-10px) rotate(12deg)}}h1{font-size:1.45rem;margin:14px 0 6px}p{margin:0;opacity:.88;line-height:1.55}.error{display:none;margin-top:16px;background:#fee2e2;color:#991b1b;border-radius:12px;padding:12px;text-align:left}
</style>
</head>
<body>
  <main class="loader">
    <div class="ball">🎾</div>
    <h1>Memuat Padel Sport Indonesia</h1>
    <p id="status">Menyiapkan direktori dan peta nasional…</p>
    <div class="error" id="error"></div>
  </main>
<script>
(async()=>{
  const status=document.getElementById('status');
  const error=document.getElementById('error');
  try{
    if(!('DecompressionStream' in window)) throw new Error('Browser belum mendukung pembukaan paket situs. Gunakan Chrome, Edge, Safari, atau Firefox versi terbaru.');
    const files=[0,1,2,3].map(n=>`bundle/padelsport.gz.b64.${String(n).padStart(2,'0')}`);
    const chunks=await Promise.all(files.map(async(file)=>{
      const res=await fetch(file,{cache:'no-store'});
      if(!res.ok) throw new Error(`Gagal memuat ${file}`);
      return (await res.text()).trim();
    }));
    status.textContent='Membuka data dan antarmuka…';
    const binary=atob(chunks.join(''));
    const bytes=Uint8Array.from(binary,c=>c.charCodeAt(0));
    const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    const html=await new Response(stream).text();
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    status.textContent='Situs belum berhasil dimuat.';
    error.style.display='block';
    error.textContent=err.message||String(err);
  }
})();
</script>
</body>
</html>
